name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-contract:
    name: Repo contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check shell syntax
        run: bash -n scripts/*.sh bin/sealion install.sh

      - name: Test Go CLI
        run: go test ./...

      - name: Check repository contract
        run: bash scripts/check_repo_contract.sh

      - name: Test CLI scaffold
        run: bash scripts/test_cli_scaffold.sh

      - name: Test generated Docker flow
        run: bash scripts/test_starter_docker_flow.sh
